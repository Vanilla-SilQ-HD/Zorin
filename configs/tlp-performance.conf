# Optional TLP drop-in: maximum performance (AC-style on battery too)
# Copy to /etc/tlp.d/ and restart TLP: sudo cp configs/tlp-performance.conf /etc/tlp.d/ && sudo systemctl restart tlp
# Overrides 99-zorin-snappy.conf for performance-related keys.

CPU_ENERGY_PERF_POLICY_ON_BAT=performance
PLATFORM_PROFILE_ON_BAT=performance
CPU_BOOST_ON_BAT=1
WIFI_PWR_ON_BAT=off
