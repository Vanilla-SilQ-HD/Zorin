# Optional TLP drop-in: maximum battery life
# Copy to /etc/tlp.d/ and restart TLP: sudo cp configs/tlp-battery.conf /etc/tlp.d/ && sudo systemctl restart tlp
# Overrides 99-zorin-snappy.conf for battery-related keys.

CPU_ENERGY_PERF_POLICY_ON_BAT=power
PLATFORM_PROFILE_ON_BAT=low-power
CPU_BOOST_ON_BAT=0
WIFI_PWR_ON_BAT=on
